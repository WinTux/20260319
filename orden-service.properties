server.port=8084
spring.datasource.url=jdbc:h2:mem:store
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
resilience4j.circuitbreaker.instances.productoServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.productoServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productoServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productoServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productoServiceCB.waitDurationInOpenState=1m
resilience4j.circuitbreaker.instances.productoServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.productoServiceCB.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.productoServiceCB.maxWaitDurationInHalfOpenState=20s
resilience4j.timelimiter.instances.productoServiceCB.timeoutDuration=3s
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=producto-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
